<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>⚡ Edit Branch</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0B132B; color: #FFFFFF; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .edit-box { background: #1C2541; border: 1px solid #3A506B; padding: 40px; border-radius: 16px; width: 100%; max-width: 650px; box-shadow: 0 12px 32px rgba(0,0,0,0.4); box-sizing: border-box; }
        .back-link { color: #4EA8DE; text-decoration: none; font-size: 14px; font-weight: 600; display: inline-block; margin-bottom: 20px; }
        .back-link:hover { text-decoration: underline; }
        .input-title { font-size: 24px; font-weight: 700; border: none; background: #0B132B; width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 16px; outline: none; color: #FFF; border: 1px solid #3A506B; box-sizing: border-box; }
        .input-title:focus { border-color: #56CFE1; }
        .textarea-content { font-size: 15px; border: none; background: #0B132B; width: 100%; height: 200px; padding: 14px; border-radius: 8px; resize: none; outline: none; color: #FFF; border: 1px solid #3A506B; box-sizing: border-box; line-height: 1.5; }
        .textarea-content:focus { border-color: #56CFE1; }
        .action-row { display: flex; justify-content: flex-end; gap: 14px; margin-top: 20px; align-items: center; }
        .btn-commit { background: linear-gradient(90deg, #56CFE1, #4EA8DE); color: #0B132B; border: none; padding: 10px 22px; border-radius: 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-commit:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(86,207,225,0.4); }
        .btn-cancel { color: #83817a; text-decoration: none; font-size: 14px; }
        .btn-cancel:hover { color: #FFF; }
        .git-alert { background: rgba(114, 9, 183, 0.2); border: 1px solid #7209B7; color: #F72585; padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="edit-box">
        <a href="/" class="back-link">← Return to Dashboard</a>
        <div class="git-alert">🛠️ Git Workflow Event: Modifying this asset builds an automated commit message tracking sequence.</div>
        <form method="post">
            <input type="text" name="title" class="input-title" value="{{ note.title }}" required>
            <textarea name="content" class="textarea-content" required>{{ note.content }}</textarea>
            <div class="action-row">
                <a href="/" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-commit">Push Version Commit</button>
            </div>
        </form>
    </div>
</body>
</html>
